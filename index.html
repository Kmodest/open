<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Social Pullup — Join the Pull Up</title>

    <!-- Open Graph for rich link previews in iMessage, Slack, etc -->
    <meta property="og:title" content="Join this Pull Up on Social Pullup 🎉">
    <meta property="og:description" content="Your crew is pulling up — tap to join the event!">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://imiraimagellc.github.io/open/og-image.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&family=Outfit:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --orange: #FF6B35;
            --orange-dark: #E85A25;
            --purple: #7B2FBE;
            --bg-dark: #0D0D12;
            --bg-card: #1A1A24;
            --text-primary: #F5F5F7;
            --text-secondary: #9494A0;
            --glow: rgba(255, 107, 53, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glow */
        body::before {
            content: '';
            position: fixed;
            top: -40%;
            left: -20%;
            width: 140%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(255, 107, 53, 0.08) 0%, rgba(123, 47, 190, 0.05) 40%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem 1.5rem;
            max-width: 420px;
            width: 100%;
        }

        /* Loading state — shown first while trying to open app */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        .loading-state.hidden {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
            position: absolute;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(255, 107, 53, 0.15);
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            font-size: 1.05rem;
            color: var(--text-secondary);
            letter-spacing: -0.01em;
        }

        /* Fallback state — shown if app doesn't open */
        .fallback-state {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }
        .fallback-state.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .emoji-hero {
            font-size: 4rem;
            line-height: 1;
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .brand {
            font-family: 'Outfit', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--orange) 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .event-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-top: -0.25rem;
        }

        .subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 300px;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            max-width: 320px;
            padding: 1rem 2rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--orange) 0%, var(--orange-dark) 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 8px 32px var(--glow), 0 2px 8px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        .cta-button:active {
            transform: scale(0.97);
            box-shadow: 0 4px 16px var(--glow);
        }

        .cta-secondary {
            display: inline-block;
            margin-top: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.2s;
        }
        .cta-secondary:hover { color: var(--text-primary); }

        .try-again-link {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--orange);
            text-decoration: none;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .try-again-link:hover { opacity: 1; }

        .footer {
            position: fixed;
            bottom: 1.25rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            opacity: 0.5;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Phase 1: Loading while attempting to open app -->
    <div class="loading-state" id="loadingState">
        <div class="spinner"></div>
        <p class="loading-text">Opening Social Pullup…</p>
    </div>

    <!-- Phase 2: Fallback if app doesn't open -->
    <div class="fallback-state" id="fallbackState">
        <div class="emoji-hero">🤙</div>
        <div class="brand">Social Pullup</div>
        <div class="event-name" id="eventName"></div>
        <p class="subtitle">Your crew is pulling up — get the app to join!</p>

        <!-- Primary: TestFlight link (change to App Store link when published) -->
        <a class="cta-button" id="downloadBtn" href="https://testflight.apple.com/join/YOUR_TESTFLIGHT_CODE">
            <svg width="20" height="20" fill="none" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.81-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" fill="#fff"/></svg>
            Download Social Pullup
        </a>

        <a class="try-again-link" id="tryAgainLink" href="#">Already have it? Tap to open →</a>

        <a class="cta-secondary" href="https://sites.google.com/view/imiraimagellc">Learn more about Social Pullup</a>
    </div>
</div>

<div class="footer">Imira Image LLC</div>

<script>
(function() {
    // Parse URL params: ?event=abc123 or ?checkin=abc123
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get('event');
    const checkinId = params.get('checkin');
    const eventName = params.get('name'); // optional: ?name=House+Warming

    // Build the deep link
    let deepLink = 'socialpullup://';
    if (eventId) deepLink += 'event/' + eventId;
    else if (checkinId) deepLink += 'checkin/' + checkinId;
    else deepLink += 'home';

    // Show event name if provided
    const nameEl = document.getElementById('eventName');
    if (eventName) {
        nameEl.textContent = decodeURIComponent(eventName);
    } else if (eventId) {
        nameEl.textContent = "You've been invited to a Pull Up!";
    }

    // Try to open the app
    const start = Date.now();
    window.location.href = deepLink;

    // After 2.5 seconds, if we're still here, the app didn't open
    setTimeout(function() {
        // If the page is hidden, the app opened successfully
        if (document.hidden || document.webkitHidden) return;

        // Show fallback
        document.getElementById('loadingState').classList.add('hidden');
        setTimeout(function() {
            document.getElementById('fallbackState').classList.add('visible');
        }, 100);
    }, 2500);

    // "Already have it?" link tries the deep link again
    document.getElementById('tryAgainLink').addEventListener('click', function(e) {
        e.preventDefault();
        window.location.href = deepLink;
    });

    // Handle visibility change — if user comes back from app, stay on fallback
    document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
            document.getElementById('loadingState').classList.add('hidden');
            setTimeout(function() {
                document.getElementById('fallbackState').classList.add('visible');
            }, 100);
        }
    });
})();
</script>

</body>
</html>
